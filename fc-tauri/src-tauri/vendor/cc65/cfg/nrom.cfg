# 捆绑默认链接脚本 · NROM(Mapper 0)。
# 当工程未在 project.toml 指定 linker_cfg 时,build_pipeline 按 Mapper 选用本文件。
# 不含 HEADER 段——iNES 头由构建编排器据 project.toml 权威生成并前置。
MEMORY {
    ZP:   start = $0000, size = $0100, type = rw, file = "";
    PRG:  start = $8000, size = $8000, type = ro, file = %O, fill = yes;
    CHR:  start = $0000, size = $2000, type = ro, file = %O, fill = yes;
}
SEGMENTS {
    CODE:     load = PRG, type = ro, start = $8000;
    VECTORS:  load = PRG, type = ro, start = $FFFA;
    CHARS:    load = CHR, type = ro;
    ZEROPAGE: load = ZP,  type = zp;
}
